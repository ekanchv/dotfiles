set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Session persistence config (must be set BEFORE tpm sources the plugins) ---

# Restore the last saved environment automatically when the tmux server starts
# (e.g. after closing every client / reboot), and keep autosaving in the
# background so window/pane layout + running programs survive a close+reopen.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'          # autosave every 5 minutes

# Also restore each pane's scrollback/output (so bash + tool output come back).
set -g @resurrect-capture-pane-contents 'on'

# Neovim: use a CUSTOM restore strategy (installed just below into resurrect).
# It relaunches with the exact `-S <file>` if nvim was started with a session,
# otherwise loads the per-directory session that the nvim config auto-maintains
# via vim-obsession (see ~/.config/nvim/lua/autocmds.lua).
set -g @resurrect-strategy-nvim 'nvimsession'

# Extra long-running interactive programs to restore (nvim/vim/etc. are already
# default). `~claude` matches claude launched with any args; `-> claude --continue`
# relaunches it so the most recent conversation in that directory is resumed.
set -g @resurrect-processes 'ssh "~claude->claude --continue"'

run '~/.tmux/plugins/tpm/tpm'

# Install the custom nvim restore strategy into tmux-resurrect. Kept canonical in
# ~/.tmux/strategies and copied in on every config load so it self-heals after a
# resurrect update/reinstall. Runs after tpm so the plugin dir exists.
run-shell 'test -d ~/.tmux/plugins/tmux-resurrect/strategies && cp -f ~/.tmux/strategies/nvim_nvimsession.sh ~/.tmux/plugins/tmux-resurrect/strategies/nvim_nvimsession.sh'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear 'xclip -selection clipboard -in'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'xclip -selection clipboard -in'
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear 'pbcopy'
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# remove bindings
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

bind-key -n C-M-n next-window
bind-key -n C-M-p previous-window
# set copy to clipboard
set -g set-clipboard on
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# maximize vertical
bind C-y resize-pane -y 100%

# Appearance
set -g pane-active-border-style fg='#CF3748'
set -g pane-border-style fg='#8c6751'
set -g pane-border-lines heavy
set -g pane-border-format "#{pane_current_command}@#{pane_current_path}"
set -g pane-border-status top
